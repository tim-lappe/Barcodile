services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-00000000000000000000000000000000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////var/www/html/var/data_prod.db}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8080}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-dev}
      S3_ACCESS_KEY_SECRET: ${S3_ACCESS_KEY_SECRET:-devsecret}
      S3_BUCKET: ${S3_BUCKET:-barcodile}
    volumes:
      - barcodile_var:/var/www/html/var
    depends_on:
      seaweedfs:
        condition: service_started
      s3-init:
        condition: service_completed_successfully

  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    command: ["mini", "-dir=/data", "-ip=127.0.0.1"]
    ports:
      - "8333:8333"
    environment:
      AWS_ACCESS_KEY_ID: dev
      AWS_SECRET_ACCESS_KEY: devsecret
    volumes:
      - seaweedfs_data:/data

  s3-init:
    image: amazon/aws-cli:2.17.0
    depends_on:
      seaweedfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /root/.aws
        printf '%s\n' '[default]' 's3 =' '  addressing_style = path' > /root/.aws/config
        for i in $$(seq 1 60); do
          if aws s3api create-bucket --bucket barcodile --endpoint-url http://seaweedfs:8333 --region us-east-1; then
            exit 0
          fi
          if aws s3api head-bucket --bucket barcodile --endpoint-url http://seaweedfs:8333 2>/dev/null; then
            exit 0
          fi
          sleep 2
        done
        exit 1
    environment:
      AWS_ACCESS_KEY_ID: dev
      AWS_SECRET_ACCESS_KEY: devsecret
      AWS_EC2_METADATA_DISABLED: "true"

volumes:
  barcodile_var:
  seaweedfs_data:
