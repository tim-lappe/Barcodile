services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-00000000000000000000000000000000}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////var/www/html/var/data_prod.db}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8080}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$}
      FILE_STORAGE_ROOT: ${FILE_STORAGE_ROOT:-/var/www/html/var/storage}
      FILE_STORAGE_BUCKET: ${FILE_STORAGE_BUCKET:-barcodile}
    privileged: true
    volumes:
      - barcodile_var:/var/www/html/var
      - /dev/input:/dev/input

volumes:
  barcodile_var:
