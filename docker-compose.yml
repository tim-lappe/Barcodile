services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    environment:
      FILE_STORAGE_ROOT: /var/www/html/var/storage
      FILE_STORAGE_BUCKET: barcodile

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      DEV_PROXY_TARGET: http://backend:8000
    command:
      [
        "sh",
        "-c",
        "npm install && exec npm run dev -- --host 0.0.0.0",
      ]
    depends_on:
      - backend

volumes:
  frontend_node_modules:
