services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    environment:
      S3_ENDPOINT: http://seaweedfs:8333
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: dev
      S3_ACCESS_KEY_SECRET: devsecret
      S3_BUCKET: barcodile
    devices:
      - /dev/input:/dev/input
    depends_on:
      s3-init:
        condition: service_completed_successfully
    command: ["php", "-S", "0.0.0.0:8000", "-t", "public"]

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      DEV_PROXY_TARGET: http://backend:8000
    command:
      [
        "sh",
        "-c",
        "npm install && exec npm run dev -- --host 0.0.0.0",
      ]
    depends_on:
      - backend

  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    command: ["mini", "-dir=/data", "-ip=127.0.0.1"]
    ports:
      - "8333:8333"
    environment:
      AWS_ACCESS_KEY_ID: dev
      AWS_SECRET_ACCESS_KEY: devsecret
    volumes:
      - seaweedfs_data:/data

  s3-init:
    image: amazon/aws-cli:2.17.0
    depends_on:
      seaweedfs:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /root/.aws
        printf '%s\n' '[default]' 's3 =' '  addressing_style = path' > /root/.aws/config
        for i in $$(seq 1 60); do
          if aws s3api create-bucket --bucket barcodile --endpoint-url http://seaweedfs:8333 --region us-east-1; then
            exit 0
          fi
          if aws s3api head-bucket --bucket barcodile --endpoint-url http://seaweedfs:8333 2>/dev/null; then
            exit 0
          fi
          sleep 2
        done
        exit 1
    environment:
      AWS_ACCESS_KEY_ID: dev
      AWS_SECRET_ACCESS_KEY: devsecret
      AWS_EC2_METADATA_DISABLED: "true"

volumes:
  seaweedfs_data:
  frontend_node_modules:
