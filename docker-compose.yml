services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
      - "5173:5173"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://barcodile:barcodile@127.0.0.1:5432/barcodile?serverVersion=16&charset=utf8}
      DEFAULT_URI: ${DEFAULT_URI:-http://localhost:8080}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://localhost(:[0-9]+)?$}
      POSTGRES_USER: ${POSTGRES_USER:-barcodile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barcodile}
      POSTGRES_DB: ${POSTGRES_DB:-barcodile}
    privileged: true
    volumes:
      - barcodile_pgdata:/var/lib/postgresql/data
      - barcodile_var:/var/www/html/var
      - ./backend:/var/www/html
      - ./frontend:/app/frontend
      - /dev/bus/usb:/dev/bus/usb
      - /dev/input:/dev/input

volumes:
  barcodile_var:
  barcodile_pgdata:
