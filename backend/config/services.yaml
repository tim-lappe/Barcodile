parameters:
    env(PICNIC_COUNTRY): NL
    env(PICNIC_API_VERSION): '15'
    env(PICNIC_URL): ''
    env(PICNIC_AUTH_KEY): ''

services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        Symfony\Bundle\FrameworkBundle\Controller\AbstractController:
            tags: ['controller.service_arguments']

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/**/Dto/'
            - '../src/Application/'

    App\Application\:
        resource: '../src/Application/'
        exclude:
            - '../src/Application/**/Dto/'

    App\Domain\Picnic\Port\PicnicCredentialCipherPort:
        alias: App\Infrastructure\Picnic\PicnicCredentialCipherAdapter

    App\Domain\Picnic\Port\PicnicPendingLoginTokenPort:
        alias: App\Infrastructure\Picnic\PicnicPendingLoginTokenCodec

    App\Domain\Picnic\Port\PicnicAnonymousAuthenticationPort:
        alias: App\Infrastructure\Picnic\PicnicAnonymousAuthenticationAdapter

    App\Domain\Picnic\Port\PicnicCatalogSearchPort:
        alias: App\Infrastructure\Picnic\PicnicCatalogSearchAdapter

    App\Domain\Scanner\Input\ScanLineKeyAccumulatorFactory:
        alias: App\Infrastructure\Scanner\EvdevScanLineKeyAccumulatorFactory

    App\Infrastructure\Picnic\PicnicAnonymousAuthenticationAdapter:
        arguments:
            $picnicApiVersion: '%env(string:PICNIC_API_VERSION)%'

    App\Infrastructure\Shared\Security\AppSecretStringCipher:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Domain\Cart\Port\CartProviderRegistry:
        arguments:
            $providers:
                barcodile: '@App\Infrastructure\Cart\Integration\InternalCartProvider'
                picnic: '@App\Domain\Picnic\Cart\PicnicCartProvider'

    App\Infrastructure\Picnic\PicnicApiConfigFactory:
        arguments:
            $defaultCountry: '%env(string:PICNIC_COUNTRY)%'
            $defaultApiVersion: '%env(string:PICNIC_API_VERSION)%'
            $defaultAuthKey: '%env(string:PICNIC_AUTH_KEY)%'
            $defaultUrl: '%env(string:PICNIC_URL)%'

    App\Infrastructure\Picnic\PicnicApiConfig:
        factory: [ '@App\Infrastructure\Picnic\PicnicApiConfigFactory', 'create' ]
        shared: false

    App\Infrastructure\Picnic\PicnicAuthState:
        shared: false

    App\Infrastructure\Picnic\PicnicClient:
        shared: false

    App\Domain\Picnic\Port\PicnicCartSessionPort:
        alias: App\Infrastructure\Picnic\PicnicCartSessionAdapter

    App\Domain\Picnic\Port\PicnicCatalogProductLookupPort:
        alias: App\Infrastructure\Picnic\PicnicCatalogProductLookupAdapter

    App\Infrastructure\Scanner\LinuxInputDeviceByIdListingAdapter:
        arguments:
            $environment: '%kernel.environment%'

    App\Domain\Scanner\Port\InputDeviceListingPort:
        alias: App\Infrastructure\Scanner\LinuxInputDeviceByIdListingAdapter
