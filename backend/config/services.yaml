parameters:
    env(PICNIC_COUNTRY): NL
    env(PICNIC_API_VERSION): '15'
    env(PICNIC_URL): ''
    env(PICNIC_AUTH_KEY): ''

services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        Symfony\Bundle\FrameworkBundle\Controller\AbstractController:
            tags: ['controller.service_arguments']
        App\Printer\Domain\Port\LabelPrinterDriver:
            tags: ['barcodile.label_printer_driver']

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/**/Dto/'

    App\AI\Domain\Port\LlmCompletionProbePort:
        alias: App\AI\Infrastructure\SymfonyAiLlmCompletionProbeAdapter

    App\Picnic\Domain\Port\PicnicCredentialCipherPort:
        alias: App\Picnic\Infrastructure\PicnicCredentialCipherAdapter

    App\Picnic\Domain\Port\PicnicPendingLoginTokenPort:
        alias: App\Picnic\Infrastructure\PicnicPendingLoginTokenCodec

    App\Picnic\Domain\Port\PicnicAnonymousAuthenticationPort:
        alias: App\Picnic\Infrastructure\PicnicAnonymousAuthenticationAdapter

    App\Picnic\Domain\Port\PicnicCatalogSearchPort:
        alias: App\Picnic\Infrastructure\PicnicCatalogSearchAdapter

    App\Scanner\Domain\Input\ScanLineKeyAccumulatorFactory:
        alias: App\Scanner\Infrastructure\EvdevScanLineKeyAccumulatorFactory

    App\SharedKernel\Domain\Label\LabelImageGenerator:
        alias: App\Inventory\Infrastructure\PythonInventoryLabelImageGenerator

    App\Inventory\Domain\Port\LabelPrinter:
        alias: App\Printer\Domain\Adapter\InventoryLabelPrinter

    App\Picnic\Infrastructure\PicnicAnonymousAuthenticationAdapter:
        arguments:
            $picnicApiVersion: '%env(string:PICNIC_API_VERSION)%'

    App\SharedKernel\Infrastructure\Security\AppSecretStringCipher:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Cart\Domain\Port\CartProviderRegistry:
        arguments:
            $providers:
                barcodile: '@App\Cart\Infrastructure\Integration\InternalCartProvider'
                picnic: '@App\Picnic\Domain\Adapter\Cart\PicnicCartProvider'

    App\Picnic\Infrastructure\PicnicApiConfigFactory:
        arguments:
            $defaultCountry: '%env(string:PICNIC_COUNTRY)%'
            $defaultApiVersion: '%env(string:PICNIC_API_VERSION)%'
            $defaultAuthKey: '%env(string:PICNIC_AUTH_KEY)%'
            $defaultUrl: '%env(string:PICNIC_URL)%'

    App\Picnic\Infrastructure\PicnicApiConfig:
        factory: [ '@App\Picnic\Infrastructure\PicnicApiConfigFactory', 'create' ]
        shared: false

    App\Picnic\Infrastructure\PicnicAuthState:
        shared: false

    App\Picnic\Infrastructure\PicnicClient:
        shared: false

    App\Debug\Application\LogApplicationService:
        arguments:
            $logsDir: '%kernel.logs_dir%'
            $environment: '%kernel.environment%'

    App\Picnic\Domain\Port\PicnicCartSessionPort:
        alias: App\Picnic\Infrastructure\PicnicCartSessionAdapter

    App\Picnic\Domain\Port\PicnicCatalogProductLookupPort:
        alias: App\Picnic\Infrastructure\PicnicCatalogProductLookupAdapter

    App\Scanner\Infrastructure\LinuxInputDeviceByIdListingAdapter:
        arguments:
            $environment: '%kernel.environment%'

    App\Scanner\Domain\Port\InputDeviceListingPort:
        alias: App\Scanner\Infrastructure\LinuxInputDeviceByIdListingAdapter

    App\Printer\Infrastructure\BrotherQl\BrotherQlLabelPrinterDriver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Inventory\Infrastructure\PythonInventoryLabelImageGenerator:
        arguments:
            $projectDir: '%kernel.project_dir%'
