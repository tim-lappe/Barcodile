doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '16.0.0'
        types:
            catalog_item_id:
                class: App\Catalog\Infrastructure\Doctrine\CatalogItemIdType
            catalog_item_attribute_id:
                class: App\Catalog\Infrastructure\Doctrine\CatalogItemAttributeIdType
            shopping_cart_id:
                class: App\Cart\Infrastructure\Doctrine\ShoppingCartIdType
            shopping_cart_line_id:
                class: App\Cart\Infrastructure\Doctrine\ShoppingCartLineIdType
            inventory_item_id:
                class: App\Inventory\Infrastructure\Doctrine\InventoryItemIdType
            cart_stock_automation_rule_id:
                class: App\Inventory\Infrastructure\Doctrine\CartStockAutomationRuleIdType
            location_id:
                class: App\Inventory\Infrastructure\Doctrine\LocationIdType
            picnic_integration_settings_id:
                class: App\Picnic\Infrastructure\Doctrine\PicnicIntegrationSettingsIdType
            scanner_device_id:
                class: App\Scanner\Infrastructure\Doctrine\ScannerDeviceIdType
            printer_device_id:
                class: App\Printer\Infrastructure\Doctrine\PrinterDeviceIdType
            persisted_domain_event_id:
                class: App\SharedKernel\Infrastructure\Doctrine\PersistedDomainEventIdType

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            Catalog:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Catalog/Domain/Entity'
                prefix: 'App\Catalog\Domain\Entity'
                alias: Catalog
            Inventory:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Inventory/Domain/Entity'
                prefix: 'App\Inventory\Domain\Entity'
                alias: Inventory
            Picnic:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Picnic/Domain/Entity'
                prefix: 'App\Picnic\Domain\Entity'
                alias: Picnic
            Cart:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Cart/Domain/Entity'
                prefix: 'App\Cart\Domain\Entity'
                alias: Cart
            Scanner:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Scanner/Domain/Entity'
                prefix: 'App\Scanner\Domain\Entity'
                alias: Scanner
            Printer:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Printer/Domain/Entity'
                prefix: 'App\Printer\Domain\Entity'
                alias: Printer
            Shared:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/SharedKernel/Domain/Entity'
                prefix: 'App\SharedKernel\Domain\Entity'
                alias: Shared

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
